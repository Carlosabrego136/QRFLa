<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MesaQR — Tu Mesa</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ac: #b8973a;
      --ac2: #d4b86a;
      --dark: rgba(0, 0, 0, 0.72);
      --glass: rgba(255, 255, 255, 0.06);
      --glass2: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 15px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BG */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #bg img,
    #bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .45;
    }

    #bg-ov {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(0, 0, 0, .5)0%, rgba(0, 0, 0, .2)40%, rgba(0, 0, 0, .7)100%);
    }

    #anim-c {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* LOADING */
    #load {
      position: fixed;
      inset: 0;
      background: #080808;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity .7s;
    }

    #load.out {
      opacity: 0;
      pointer-events: none;
    }

    .lw {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: .08em;
      color: rgba(255, 255, 255, .8);
    }

    .lw span {
      color: var(--ac);
    }

    .lbar {
      width: 100px;
      height: 1px;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .lbar-f {
      height: 100%;
      background: var(--ac);
      animation: lb 1.3s ease-in-out infinite;
    }

    @keyframes lb {
      0% {
        transform: translateX(-100%)
      }

      100% {
        transform: translateX(200%)
      }
    }

    /* CONTENT */
    .wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 2rem;
    }

    /* HEADER */
    .hd {
      text-align: center;
      padding: 7vh 1rem 4vh;
      width: 100%;
    }

    .hd-tag {
      display: inline-block;
      font-size: .58rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--ac);
      border: 1px solid rgba(201, 169, 110, .3);
      padding: 4px 14px;
      margin-bottom: 1.2rem;
      animation: fadeD .8s .1s both;
    }

    .hd-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 200;
      line-height: 1.05;
      letter-spacing: .02em;
      text-shadow: 0 2px 20px rgba(0, 0, 0, .5);
      animation: fadeD .8s .2s both;
    }

    .hd-title em {
      font-style: italic;
      color: var(--ac);
    }

    .hd-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(.9rem, 3vw, 1.1rem);
      color: rgba(255, 255, 255, .5);
      margin-top: .6rem;
      animation: fadeD .8s .3s both;
    }

    /* SEARCH */
    .search-wrap {
      width: 100%;
      max-width: 440px;
      animation: fadeU .7s .4s both;
    }

    .search-label {
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .4);
      margin-bottom: .6rem;
      display: block;
    }

    .search-row {
      position: relative;
    }

    .search-in {
      width: 100%;
      padding: 14px 52px 14px 18px;
      background: rgba(255, 255, 255, .07);
      border: 1px solid var(--border);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      letter-spacing: .02em;
      outline: none;
      transition: border-color .25s, background .25s;
      -webkit-appearance: none;
    }

    .search-in::placeholder {
      color: rgba(255, 255, 255, .25);
    }

    .search-in:focus {
      border-color: var(--ac);
      background: rgba(255, 255, 255, .09);
    }

    .search-btn {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 50px;
      background: var(--ac);
      border: none;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }

    .search-btn:hover {
      background: var(--ac2);
    }

    .suggests {
      background: rgba(8, 8, 8, .96);
      border: 1px solid var(--border);
      border-top: none;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .sug-item {
      padding: .65rem 1rem;
      font-size: .82rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      transition: background .12s;
    }

    .sug-item:hover {
      background: rgba(201, 169, 110, .08);
    }

    .sug-item mark {
      background: none;
      color: var(--ac);
      font-weight: 500;
    }

    .sug-mesa {
      font-size: .68rem;
      color: var(--ac);
      font-family: 'DM Mono', monospace;
    }

    .not-found {
      display: none;
      font-size: .78rem;
      color: rgba(255, 255, 255, .4);
      text-align: center;
      padding: .9rem 1rem;
      border: 1px solid var(--border);
      border-top: none;
    }

    /* RESULT */
    .result {
      display: none;
      width: 100%;
      max-width: 440px;
      margin-top: 1.4rem;
      animation: revealR .6s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes revealR {
      from {
        opacity: 0;
        transform: scale(.92) translateY(16px)
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0)
      }
    }

    .res-inner {
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(201, 169, 110, .22);
      padding: 1.8rem 1.6rem;
      position: relative;
      overflow: hidden;
    }

    .res-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ac), transparent);
    }

    .res-greet {
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--ac);
      margin-bottom: .4rem;
    }

    .res-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 200;
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }

    .res-name em {
      font-style: italic;
      color: var(--ac);
    }

    .deco {
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ac), transparent);
      margin: .9rem 0;
    }

    /* TABLE DISPLAY */
    .table-show {
      text-align: center;
      margin: 1rem 0;
    }

    .tbl-label {
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .4);
      margin-bottom: .5rem;
    }

    .tbl-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 1px solid var(--ac);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(201, 169, 110, .06);
      position: relative;
      margin: 0 auto;
    }

    .tbl-circle.glow {
      box-shadow: 0 0 0 0 rgba(201, 169, 110, .5);
      animation: tblGlow 2.5s ease-in-out infinite;
    }

    .tbl-circle.pulse {
      animation: tblPulse 1.8s ease-in-out infinite;
    }

    .tbl-circle.reveal {
      animation: tblReveal .7s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    @keyframes tblGlow {

      0%,
      100% {
        box-shadow: 0 0 16px rgba(201, 169, 110, .2)
      }

      50% {
        box-shadow: 0 0 36px rgba(201, 169, 110, .55), 0 0 70px rgba(201, 169, 110, .2)
      }
    }

    @keyframes tblPulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.07)
      }
    }

    @keyframes tblReveal {
      from {
        transform: scale(0) rotate(-15deg);
        opacity: 0
      }

      to {
        transform: scale(1) rotate(0);
        opacity: 1
      }
    }

    .tbl-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 200;
      color: #fff;
      line-height: 1;
    }

    .tbl-w {
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ac);
      margin-top: 2px;
    }

    /* MAP SECTION */
    .map-section {
      display: none;
      width: 100%;
      max-width: 440px;
      margin-top: .8rem;
    }

    .map-toggle {
      width: 100%;
      padding: 10px;
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      color: rgba(255, 255, 255, .55);
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem;
      letter-spacing: .1em;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .map-toggle:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    .map-body {
      display: none;
      margin-top: .5rem;
      background: rgba(0, 0, 0, .55);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .map-body.open {
      display: block;
    }

    #guest-map-canvas {
      display: block;
      width: 100%;
      cursor: default;
    }

    .map-legend {
      padding: .6rem 1rem;
      font-size: .6rem;
      color: rgba(255, 255, 255, .3);
      letter-spacing: .08em;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .map-legend span {
      color: var(--ac);
    }

    /* ACTIONS */
    .res-actions {
      display: flex;
      gap: .5rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    .btn-ac {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: .68rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      border: none;
    }

    .btn-main {
      background: var(--ac);
      color: #fff;
      flex: 1;
    }

    .btn-main:hover {
      background: var(--ac2);
    }

    .btn-out {
      background: transparent;
      border: 1px solid var(--border);
      color: rgba(255, 255, 255, .6);
      flex: 1;
    }

    .btn-out:hover {
      border-color: var(--ac);
      color: var(--ac);
    }

    /* WELCOME MSG */
    .welcome-msg {
      display: none;
      text-align: center;
      margin-top: 1rem;
      padding: .8rem 1rem;
      border-top: 1px solid rgba(255, 255, 255, .06);
    }

    .welcome-msg p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: rgba(255, 255, 255, .55);
      line-height: 1.6;
    }

    /* AGAIN */
    .again {
      display: none;
      text-align: center;
      margin-top: 1rem;
    }

    .again button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, .35);
      font-family: 'DM Sans', sans-serif;
      font-size: .72rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .again button:hover {
      color: var(--ac);
    }

    /* ANIMS */
    @keyframes fadeU {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeD {
      from {
        opacity: 0;
        transform: translateY(-14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body>

  <div id="load">
    <div class="lw">Mesa<span>QR</span></div>
    <div class="lbar">
      <div class="lbar-f"></div>
    </div>
  </div>

  <div id="bg"></div>
  <div id="bg-ov"></div>
  <canvas id="anim-c"></canvas>

  <div class="wrap">
    <div class="hd">
      <div class="hd-tag" id="g-type">Evento</div>
      <div class="hd-title" id="g-title">Bienvenido</div>
      <div class="hd-sub" id="g-sub">Escribe tu nombre para encontrar tu mesa</div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap" id="search-wrap">
      <span class="search-label">¿Cuál es tu nombre?</span>
      <div class="search-row">
        <input class="search-in" id="search-in" type="text" placeholder="Escribe tu nombre..." autocomplete="off" autocorrect="off" oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-btn" onclick="doSearch()">→</button>
      </div>
      <div class="suggests" id="suggests"></div>
      <div class="not-found" id="not-found">No encontramos ese nombre. Intenta con tus apellidos. 🙏</div>
    </div>

    <!-- RESULT -->
    <div class="result" id="result">
      <div class="res-inner">
        <div class="res-greet">¡Bienvenido/a!</div>
        <div class="res-name" id="res-name">—</div>
        <div class="deco"></div>
        <div class="table-show">
          <div class="tbl-label">Tu mesa</div>
          <div class="tbl-circle" id="tbl-el">
            <div class="tbl-n" id="tbl-num">—</div>
            <div class="tbl-w">Mesa</div>
          </div>
        </div>
        <div class="welcome-msg" id="welcome-msg">
          <p id="welcome-txt"></p>
        </div>
        <div class="res-actions">
          <button class="btn-ac btn-out" onclick="resetSearch()">🔍 Buscar otro</button>
          <button class="btn-ac btn-main" onclick="toggleMap()">🗺 Ver mapa de mesas</button>
        </div>
      </div>
    </div>

    <!-- MAP -->
    <div class="map-section" id="map-section">
      <div class="map-body open" id="map-body">
        <canvas id="guest-map-canvas"></canvas>
        <div class="map-legend">Tu mesa está <span>resaltada</span> — los iconos muestran entradas, escenario y más
        </div>
      </div>
    </div>

    <div class="again" id="again"><button onclick="resetSearch()">← Buscar otro nombre</button></div>
  </div>

  <script>
    const SB='https://nhasvajymzawqykesaeg.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oYXN2YWp5bXphd3F5a2VzYWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDM2MDUsImV4cCI6MjA5MjgxOTYwNX0.zU6gQii-EqKakxeTOvjMNYDlb6s_mFdNtjc_F0iEVl0';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`};
const p=new URLSearchParams(location.search);
const EID=p.get('e')||p.get('event');
let ev=null,guests=[],layout=[],foundTable=null;
let animPs=[],animRun=false,animFr=null;
let mapScale=1,mapPan={x:0,y:0},mapTouches=null;
const ac=document.getElementById('anim-c');
const actx=ac.getContext('2d');
function resAC(){ac.width=window.innerWidth;ac.height=window.innerHeight;}
resAC();window.addEventListener('resize',resAC);

async function load(){
  if(!EID){hide();return;}
  const [evR,gR,lR]=await Promise.all([
    fetch(`${SB}/rest/v1/events?id=eq.${EID}`,{headers:H}).then(r=>r.json()),
    fetch(`${SB}/rest/v1/guests?event_id=eq.${EID}&limit=1000`,{headers:H}).then(r=>r.json()),
    fetch(`${SB}/rest/v1/table_layout?event_id=eq.${EID}&limit=1000`,{headers:H}).then(r=>r.json()),
  ]);
  if(!evR||!evR[0]){hide();return;}
  ev=evR[0];guests=gR||[];layout=lR||[];
  applyTheme();applyBg();renderUI();startAmbient();
  hide();
}

function hide(){document.getElementById('load').classList.add('out');}

function applyTheme(){
  const c=ev.color||'#b8973a';
  document.documentElement.style.setProperty('--ac',c);
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  document.documentElement.style.setProperty('--ac-rgb',`${r},${g},${b}`);
}

function applyBg(){
  if(ev.bg_url){
    document.getElementById('bg').innerHTML=ev.bg_type==='video'
      ?`<video src="${ev.bg_url}" autoplay muted loop playsinline></video>`
      :`<img src="${ev.bg_url}" alt="">`;
  }
}

function renderUI(){
  document.getElementById('g-type').textContent=ev.type||'Evento';
  document.getElementById('g-title').textContent=ev.name||(ev.host?`Bienvenido a la celebración de ${ev.host}`:'Bienvenido');
  document.getElementById('g-sub').textContent=ev.welcome_msg||'Escribe tu nombre para encontrar tu mesa';
}

/* ── SEARCH ── */
function onSearch(v){
  const q=v.trim().toLowerCase();
  document.getElementById('not-found').style.display='none';
  document.getElementById('result').style.display='none';
  if(!q){document.getElementById('suggests').style.display='none';return;}
  const matches=guests.filter(g=>g.name.toLowerCase().includes(q));
  const sg=document.getElementById('suggests');
  if(!matches.length){sg.style.display='none';return;}
  sg.style.display='block';
  sg.innerHTML=matches.slice(0,8).map(g=>`<div class="sug-item" onclick="showResult('${g.name.replace(/'/,"\\'").replace(/"/,'\\"')}',${g.table_number})">
    <span>${hl(g.name,q)}</span><span class="sug-mesa">Mesa ${g.table_number}</span></div>`).join('');
}

function hl(name,q){
  const i=name.toLowerCase().indexOf(q);
  if(i===-1)return name;
  return name.slice(0,i)+'<mark>'+name.slice(i,i+q.length)+'</mark>'+name.slice(i+q.length);
}

function doSearch(){
  const q=document.getElementById('search-in').value.trim().toLowerCase();
  if(!q)return;
  const m=guests.find(g=>g.name.toLowerCase().includes(q));
  document.getElementById('suggests').style.display='none';
  if(m)showResult(m.name,m.table_number);
  else{document.getElementById('not-found').style.display='block';}
}

function showResult(name,tnum){
  foundTable=tnum;
  document.getElementById('suggests').style.display='none';
  document.getElementById('not-found').style.display='none';
  document.getElementById('search-in').value=name;
  document.getElementById('res-name').innerHTML=`<em>${name}</em>`;
  document.getElementById('tbl-num').textContent=tnum;

  // Apply table animation
  const ta=ev.table_anim||'glow';
  const el=document.getElementById('tbl-el');
  el.className='tbl-circle';
  el.style.borderColor=ev.color||'#b8973a';
  if(ta!=='none'){void el.offsetWidth;el.classList.add(ta);}

  // Welcome message
  if(ev.welcome_msg){
    document.getElementById('welcome-txt').textContent=ev.welcome_msg;
    document.getElementById('welcome-msg').style.display='block';
  }

  document.getElementById('result').style.display='block';
  document.getElementById('map-section').style.display='block';
  document.getElementById('again').style.display='block';

  // Trigger celebration animation
  triggerCelebration();

  // Draw map with highlight
  setTimeout(()=>{drawGuestMap(tnum);},200);

  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth',block:'center'}),150);
}

function toggleMap(){
  const body=document.getElementById('map-body');
  body.classList.toggle('open');
  if(body.classList.contains('open')&&foundTable) drawGuestMap(foundTable);
}

function resetSearch(){
  document.getElementById('search-in').value='';
  document.getElementById('result').style.display='none';
  document.getElementById('map-section').style.display='none';
  document.getElementById('again').style.display='none';
  document.getElementById('not-found').style.display='none';
  document.getElementById('map-body').classList.remove('open');
  foundTable=null;
  stopCelebration();
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('search-in').focus();
}

/* ── GUEST MAP ── */
const GM_COLORS={entry:'#22c55e',exit:'#f59e0b',stage:'#8b5cf6',bar:'#ec4899',dance:'#3b82f6'};
const GM_ICONS={entry:'🚪',exit:'🚶',stage:'🎤',bar:'🍾',dance:'💃'};
const GM_LABELS={entry:'Entrada',exit:'Salida',stage:'Escenario',bar:'Barra',dance:'Pista'};

function drawGuestMap(highlightN){
  const canvas=document.getElementById('guest-map-canvas');
  const wrap=canvas.parentElement;
  const W=wrap.clientWidth;

  // Parse markers
  let markers=[];
  try{if(ev.map_markers)markers=JSON.parse(ev.map_markers);}catch(x){}

  const hasItems=layout.length>0;
  // Altura suficiente — no se corte
  const H=Math.min(Math.max(hasItems?380:180, W*0.7), 480);
  canvas.width=W; canvas.height=H; canvas.style.height=H+'px';
  const ctx2=canvas.getContext('2d');

  if(!hasItems){
    ctx2.clearRect(0,0,W,H);
    ctx2.fillStyle='rgba(255,255,255,0.2)';
    ctx2.font='14px DM Sans,sans-serif';
    ctx2.textAlign='center'; ctx2.textBaseline='middle';
    ctx2.fillText('Mapa no disponible',W/2,H/2);
    return;
  }

  // Calcular bounds incluyendo todos los elementos
  const allX=[...layout.map(t=>t.x),...markers.map(m=>m.x)];
  const allY=[...layout.map(t=>t.y),...markers.map(m=>m.y)];
  const minX=Math.min(...allX), maxX=Math.max(...allX);
  const minY=Math.min(...allY), maxY=Math.max(...allY);
  const rangeX=maxX-minX||1, rangeY=maxY-minY||1;

  // Escala que asegura que TODO cabe dentro con padding generoso
  const pad=40;
  const scX=(W-pad*2)/rangeX;
  const scY=(H-pad*2)/rangeY;
  const sc=Math.min(scX,scY)*0.88;

  // Centrado exacto
  const usedW=rangeX*sc, usedH=rangeY*sc;
  const offX=(W-usedW)/2 - minX*sc;
  const offY=(H-usedH)/2 - minY*sc;

  function tx(x){return x*sc+offX;}
  function ty(y){return y*sc+offY;}

  // Tamaño de mesa proporcional, legible
  const r=Math.max(10,Math.min(22,sc*18));
  const ac2=ev.color||'#b8973a';

  function drawFrame(pf){
    ctx2.clearRect(0,0,W,H);

    // Fondo oscuro semitransparente para que se vea bien
    ctx2.fillStyle='rgba(5,5,15,0.82)';
    ctx2.fillRect(0,0,W,H);

    // Grid de puntos sutil
    ctx2.fillStyle='rgba(255,255,255,0.04)';
    for(let x=0;x<W;x+=22)for(let y=0;y<H;y+=22){
      ctx2.beginPath();ctx2.arc(x,y,1,0,Math.PI*2);ctx2.fill();
    }

    // ── MARCADORES ──
    markers.forEach(m=>{
      const x=tx(m.x), y=ty(m.y);
      const col=GM_COLORS[m.type]||'#888';
      const mr=Math.max(16,r*1.3);
      ctx2.save();
      ctx2.shadowBlur=14; ctx2.shadowColor=col+'88';
      ctx2.beginPath(); ctx2.arc(x,y,mr,0,Math.PI*2);
      ctx2.fillStyle=col+'44'; ctx2.fill();
      ctx2.shadowBlur=0;
      ctx2.strokeStyle=col; ctx2.lineWidth=2;
      ctx2.beginPath(); ctx2.arc(x,y,mr,0,Math.PI*2); ctx2.stroke();
      // Emoji
      const emojiSz=Math.max(14,mr*0.95);
      ctx2.font=`${emojiSz}px serif`;
      ctx2.textAlign='center'; ctx2.textBaseline='middle';
      ctx2.fillText(GM_ICONS[m.type]||'📍',x,y);
      // Etiqueta fondo oscuro
      const lbl=m.customLabel||GM_LABELS[m.type]||m.type;
      const labelY=y+mr+10;
      ctx2.font=`bold ${Math.max(8,10)}px DM Sans,sans-serif`;
      ctx2.textBaseline='top';
      const lw=ctx2.measureText(lbl).width+10;
      ctx2.fillStyle='rgba(0,0,0,0.75)';
      ctx2.fillRect(x-lw/2,labelY-1,lw,14);
      ctx2.fillStyle=col;
      ctx2.fillText(lbl,x,labelY);
      ctx2.restore();
    });

    // ── MESAS ──
    layout.forEach(t=>{
      const x=tx(t.x), y=ty(t.y);
      const isHL=t.table_number===highlightN;
      const shape=t.shape||'round';
      ctx2.save();

      if(isHL){
        // Anillo pulsante
        if(pf!==undefined){
          const pr=r+5+Math.sin(pf)*4;
          ctx2.globalAlpha=0.35+Math.sin(pf)*0.2;
          ctx2.beginPath();ctx2.arc(x,y,pr,0,Math.PI*2);
          ctx2.strokeStyle=ac2;ctx2.lineWidth=2.5;ctx2.stroke();
          ctx2.globalAlpha=1;
        }
        ctx2.shadowBlur=24; ctx2.shadowColor=ac2;
      }

      const fill=isHL?ac2:'rgba(255,255,255,0.13)';
      const stroke=isHL?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.18)';
      const lw2=isHL?1.5:1;

      if(shape==='rect'){
        ctx2.fillStyle=fill;ctx2.fillRect(x-r*1.35,y-r*.65,r*2.7,r*1.3);
        ctx2.strokeStyle=stroke;ctx2.lineWidth=lw2;ctx2.strokeRect(x-r*1.35,y-r*.65,r*2.7,r*1.3);
      } else if(shape==='oval'){
        ctx2.beginPath();ctx2.ellipse(x,y,r*1.45,r*.82,0,0,Math.PI*2);
        ctx2.fillStyle=fill;ctx2.fill();ctx2.strokeStyle=stroke;ctx2.lineWidth=lw2;ctx2.stroke();
      } else if(shape==='square'){
        ctx2.fillStyle=fill;ctx2.fillRect(x-r,y-r,r*2,r*2);
        ctx2.strokeStyle=stroke;ctx2.lineWidth=lw2;ctx2.strokeRect(x-r,y-r,r*2,r*2);
      } else {
        ctx2.beginPath();ctx2.arc(x,y,r,0,Math.PI*2);
        ctx2.fillStyle=fill;ctx2.fill();ctx2.strokeStyle=stroke;ctx2.lineWidth=lw2;ctx2.stroke();
      }
      ctx2.shadowBlur=0;
      // Número de mesa — más grande y legible
      ctx2.fillStyle=isHL?'#fff':'rgba(255,255,255,0.6)';
      ctx2.font=`${isHL?'bold ':''} ${Math.max(8,r*0.7)}px DM Mono,monospace`;
      ctx2.textAlign='center';ctx2.textBaseline='middle';
      ctx2.fillText(t.label||t.table_number,x,y);
      ctx2.restore();
    });
  }

  // Draw estático primero
  drawFrame(undefined);

  // Loop animado para el pulso de la mesa resaltada
  if(highlightN){
    let pf=0;
    let rafId;
    function loop(){
      if(!foundTable||!document.getElementById('guest-map-canvas')){cancelAnimationFrame(rafId);return;}
      pf=(pf+0.04)%(Math.PI*2);
      drawFrame(pf);
      rafId=requestAnimationFrame(loop);
    }
    loop();
  }
}

/* ── AMBIENT ANIMATION ── */
function startAmbient(){
  const W=ac.width,H=ac.height;
  const rgb=ev?(()=>{const c=ev.color||'#b8973a';const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);return`${r},${g},${b}`;})():'184,151,58';
  for(let i=0;i<50;i++){
    animPs.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      size:.7+Math.random()*1.8,alpha:Math.random()*.4,aV:(Math.random()-.5)*.01,
      color:i%3===0?`rgba(${rgb},.8)`:'rgba(255,255,255,0.4)',type:'ambient'});
  }
  animRun=true;drawAmbient();
}

function drawAmbient(){
  actx.clearRect(0,0,ac.width,ac.height);
  const W=ac.width,H=ac.height;
  animPs.filter(p=>p.type==='ambient').forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.alpha+=p.aV;
    if(p.alpha>.45||p.alpha<0)p.aV*=-1;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    actx.save();actx.globalAlpha=Math.max(0,p.alpha);
    actx.beginPath();actx.arc(p.x,p.y,p.size,0,Math.PI*2);
    actx.fillStyle=p.color;actx.fill();actx.restore();
  });
  // Celebration particles
  animPs=animPs.filter(p=>p.type==='ambient'||p.alpha>0.005);
  animPs.filter(p=>p.type==='spark'||p.type==='petal').forEach(p=>{
    actx.save();actx.globalAlpha=Math.max(0,p.alpha);
    if(p.type==='spark'){
      p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.vx*=.985;p.alpha-=.012;
      actx.beginPath();actx.arc(p.x,p.y,p.size,0,Math.PI*2);
      actx.fillStyle=p.color;actx.shadowBlur=8;actx.shadowColor=p.color;actx.fill();
    } else if(p.type==='petal'){
      p.sway+=p.swayS;p.x+=p.vx+Math.sin(p.sway)*.5;p.y+=p.vy;p.rot+=p.rotV;p.alpha-=.004;
      actx.translate(p.x,p.y);actx.rotate(p.rot*Math.PI/180);
      actx.beginPath();actx.ellipse(0,0,p.size/2,p.size/3.2,0,0,Math.PI*2);
      actx.fillStyle=p.color;actx.fill();
    }
    actx.restore();
  });
  if(animRun)animFr=requestAnimationFrame(drawAmbient);
}

function triggerCelebration(){
  const W=ac.width,H=ac.height;
  const c=ev.color||'#b8973a';
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  const cols=[`rgba(${r},${g},${b},1)`,'rgba(255,255,255,1)','rgba(255,215,0,1)','rgba(255,180,180,1)'];
  // Burst
  for(let i=0;i<80;i++){
    const a=(Math.PI*2*i)/80+(Math.random()-.5)*.3;
    const s=2+Math.random()*5;
    animPs.push({x:W/2,y:H*.5,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      size:1.2+Math.random()*2,alpha:1,type:'spark',
      color:cols[Math.floor(Math.random()*cols.length)]});
  }
}

function stopCelebration(){
  animPs=animPs.filter(p=>p.type==='ambient');
}

load();
  </script>
