<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MesaQR — Pantalla</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #000;
    }

    /* BG */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #bg img,
    #bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #bg-ov {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0.15) 40%, rgba(0, 0, 0, 0.55) 100%);
    }

    /* CANVAS ANIM */
    #ac {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* LAYOUT — VERTICAL: imagen arriba, QR abajo */
    .screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 0;
    }

    /* TOP BAR — ocupa la mayor parte, nombre del evento grande */
    .top {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6vh 6vw 2vh;
      text-align: center;
      width: 100%;
    }

    .ev-type {
      display: inline-block;
      font-size: clamp(0.5rem, 1.2vw, 0.75rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 5px 16px;
      margin-bottom: 1.8vh;
    }

    .ev-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 5rem);
      font-weight: 200;
      color: #fff;
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.4);
    }

    .ev-name em {
      font-style: italic;
    }

    .ev-date {
      font-size: clamp(0.65rem, 1.4vw, 0.9rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 1vh;
    }

    /* MIDDLE — oculto en vertical (QR va abajo) */
    .mid {
      display: none;
    }

    /* BOTTOM — donde vive el QR */
    .bot {
      width: 100%;
      padding: 2vh 6vw 5vh;
      text-align: center;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2vh;
    }

    .qr-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .qr-frame {
      position: relative;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
    }

    .qr-frame::before,
    .qr-frame::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
    }

    .qr-frame::before {
      top: -1px;
      left: -1px;
      border-top: 2px solid var(--ac, #b8973a);
      border-left: 2px solid var(--ac, #b8973a);
    }

    .qr-frame::after {
      bottom: -1px;
      right: -1px;
      border-bottom: 2px solid var(--ac, #b8973a);
      border-right: 2px solid var(--ac, #b8973a);
    }

    .qr-inner {
      width: var(--qr-size, 200px);
      height: var(--qr-size, 200px);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-scan {
      font-size: clamp(0.6rem, 1.2vw, 0.78rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 12px;
      text-align: center;
    }

    .qr-scan strong {
      color: var(--ac, #b8973a);
      display: block;
      font-weight: 300;
      font-size: 1.15em;
      margin-bottom: 3px;
    }

    .welcome {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.8rem, 1.8vw, 1.2rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.5;
      max-width: 500px;
      margin: 0 auto;
    }

    .powered {
      font-size: clamp(0.45rem, 0.8vw, 0.55rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.18);
    }

    .deco-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ac, #b8973a), transparent);
      margin: 0.8vh auto;
    }

    /* HORIZONTAL LAYOUT */
    body.horiz .screen {
      flex-direction: row;
      padding: 0;
    }

    body.horiz .top {
      padding: 5vh 4vw;
      text-align: left;
      width: auto;
      flex: 1.4;
      justify-content: center;
    }

    body.horiz .mid {
      display: none;
    }

    body.horiz .bot {
      flex: 1;
      padding: 5vh 4vw;
      justify-content: center;
      background: linear-gradient(to left, rgba(0, 0, 0, 0.7) 0%, transparent 100%);
      gap: 2vh;
    }

    body.horiz .qr-inner {
      width: var(--qr-size, 220px);
      height: var(--qr-size, 220px);
    }

    body.horiz .deco-line {
      margin: 1vh 0;
    }

    body.horiz .welcome {
      max-width: 100%;
      text-align: left;
    }

    /* LOADING */
    #load {
      position: fixed;
      inset: 0;
      background: #050505;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.8s;
    }

    #load.hide {
      opacity: 0;
      pointer-events: none;
    }

    .load-wm {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.1em;
    }

    .load-wm span {
      color: #b8973a;
    }

    .load-bar {
      width: 120px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .load-bar-f {
      height: 100%;
      background: #b8973a;
      animation: lb 1.4s ease-in-out infinite;
    }

    @keyframes lb {
      0% {
        transform: translateX(-100%)
      }

      100% {
        transform: translateX(200%)
      }
    }

    /* PULSE RING */
    @keyframes ring {
      0% {
        transform: scale(1);
        opacity: 0.6
      }

      100% {
        transform: scale(1.5);
        opacity: 0
      }
    }

    .pulse-ring {
      position: absolute;
      inset: -12px;
      border: 1px solid var(--ac, #b8973a);
      animation: ring 2.5s ease-out infinite;
    }

    .pulse-ring2 {
      position: absolute;
      inset: -24px;
      border: 1px solid var(--ac, #b8973a);
      animation: ring 2.5s ease-out 0.8s infinite;
    }
  </style>
</head>

<body>

  <div id="load">
    <div class="load-wm">Mesa<span>QR</span></div>
    <div class="load-bar">
      <div class="load-bar-f"></div>
    </div>
  </div>

  <div id="bg"></div>
  <div id="bg-ov"></div>
  <canvas id="ac"></canvas>

  <div class="screen" id="screen">
    <!-- TOP: foto/imagen del evento, nombre grande -->
    <div class="top">
      <div class="ev-type" id="d-type">Evento</div>
      <div class="ev-name" id="d-name">—</div>
      <div class="ev-date" id="d-date"></div>
    </div>

    <!-- MID: oculto en vertical -->
    <div class="mid"></div>

    <!-- BOT: QR abajo, como en la foto de ejemplo -->
    <div class="bot">
      <div class="welcome" id="d-welcome">Bienvenido a esta noche tan especial</div>
      <div class="deco-line"></div>
      <div class="qr-card">
        <div class="qr-frame" style="position:relative;">
          <div class="pulse-ring" id="pr1"></div>
          <div class="pulse-ring2" id="pr2"></div>
          <div class="qr-inner" id="qr-display"></div>
        </div>
        <div class="qr-scan">
          <strong id="d-scan-title">Escanea para encontrar tu mesa</strong>
          <span id="d-scan-sub">Abre la cámara de tu celular</span>
        </div>
      </div>
      <div class="powered">MesaQR · by Invitaciones4You</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const SB='https://nhasvajymzawqykesaeg.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oYXN2YWp5bXphd3F5a2VzYWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDM2MDUsImV4cCI6MjA5MjgxOTYwNX0.zU6gQii-EqKakxeTOvjMNYDlb6s_mFdNtjc_F0iEVl0';
const H={apikey:KEY,Authorization:`Bearer ${KEY}`};

const params=new URLSearchParams(location.search);
const EID=params.get('e')||params.get('event');
let ev=null,animPs=[],animRun=false,animFr=null;
const canvas=document.getElementById('ac');
const ctx=canvas.getContext('2d');

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',()=>{resize();if(ev)initAnim(ev.animation);});

async function load(){
  if(!EID){document.getElementById('d-name').textContent='Sin evento';hide();return;}
  const r=await fetch(`${SB}/rest/v1/events?id=eq.${EID}`,{headers:H});
  const data=await r.json();
  if(!data||!data[0]){document.getElementById('d-name').textContent='Evento no encontrado';hide();return;}
  ev=data[0];
  applyTheme();applyBg();buildQR();renderUI();initAnim(ev.animation||'particles');
  setTimeout(hide,1000);
}

function hide(){document.getElementById('load').classList.add('hide');}

function applyTheme(){
  const c=ev.color||'#b8973a';
  document.documentElement.style.setProperty('--ac',c);
  document.querySelectorAll('[id^=pr]').forEach(el=>el.style.borderColor=c);
}

function applyBg(){
  const bg=document.getElementById('bg');
  if(ev.bg_url){
    bg.innerHTML=ev.bg_type==='video'
      ?`<video src="${ev.bg_url}" autoplay muted loop playsinline></video>`
      :`<img src="${ev.bg_url}" alt="">`;
  } else {
    bg.style.background='linear-gradient(135deg,#0a0a0a 0%,#1c1c1c 100%)';
  }
  if(ev.orientation==='horizontal') document.body.classList.add('horiz');
}

function buildQR(){
  const url=`${location.origin}${location.pathname.replace('display.html','guest.html')}?e=${EID}`;
  const size=ev.qr_size||200;
  // Set CSS variable for dynamic sizing
  document.documentElement.style.setProperty('--qr-size', size+'px');
  document.getElementById('qr-display').innerHTML='';
  try{new QRCode(document.getElementById('qr-display'),{text:url,width:size,height:size,colorDark:'#0a0a0a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(x){}
}

function renderUI(){
  document.getElementById('d-type').textContent=ev.type||'Evento';
  document.getElementById('d-name').innerHTML=ev.name||'';
  if(ev.host) document.getElementById('d-name').innerHTML=ev.name+' <em>'+ev.host+'</em>';
  document.getElementById('d-date').textContent=ev.date?'📅 '+ev.date:'';
  document.getElementById('d-welcome').textContent=ev.welcome_msg||'Bienvenidos a esta noche tan especial';
}

/* ── ANIMACIONES ── */
function initAnim(type){
  if(animFr){cancelAnimationFrame(animFr);animFr=null;}
  animPs=[];animRun=true;
  const W=canvas.width,H=canvas.height;
  const ac=ev?ev.color||'#b8973a':'#b8973a';
  const hexToRgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`;};
  const rgb=hexToRgb(ac);

  if(type==='particles'){
    for(let i=0;i<120;i++){
      animPs.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
        size:.8+Math.random()*2,alpha:Math.random()*.7,aV:(Math.random()-.5)*.012,
        color:i%3===0?`rgba(${rgb},1)`:'rgba(255,255,255,0.5)',type:'dot'});
    }
    // Connection lines handled in draw
  } else if(type==='petals'){
    for(let i=0;i<80;i++){
      animPs.push({x:Math.random()*W,y:-20-Math.random()*H,
        vx:(Math.random()-.5)*1.2,vy:.6+Math.random()*1.2,
        size:6+Math.random()*10,rot:Math.random()*360,rotV:(Math.random()-.5)*2,
        sway:Math.random()*Math.PI*2,swayS:.015+Math.random()*.015,
        alpha:.6+Math.random()*.4,
        color:[`rgba(${rgb},.8)`,'rgba(255,255,255,0.6)','rgba(255,220,220,0.7)'][Math.floor(Math.random()*3)],
        type:'petal'});
    }
  } else if(type==='fireworks'){
    spawnFw(W*.5,H*.4,ac);
    setTimeout(()=>spawnFw(W*.25,H*.35,ac),800);
    setTimeout(()=>spawnFw(W*.75,H*.3,ac),1500);
    setTimeout(()=>spawnFw(W*.5,H*.45,ac),2600);
    setTimeout(()=>initAnim('fireworks'),3600);
  } else if(type==='snow'){
    for(let i=0;i<100;i++){
      animPs.push({x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-.5)*.5,vy:.3+Math.random()*.8,
        size:1+Math.random()*3,alpha:.4+Math.random()*.5,
        color:'rgba(255,255,255,0.8)',type:'snow'});
    }
  } else if(type==='bokeh'){
    for(let i=0;i<50;i++){
      animPs.push({x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
        size:8+Math.random()*28,alpha:0+Math.random()*.3,aV:(Math.random()-.5)*.006,
        color:i%2===0?`rgba(${rgb},.4)`:'rgba(255,255,255,0.25)',type:'bokeh'});
    }
  } else if(type==='none'){
    animRun=false;return;
  }
  drawAnim();
}

function spawnFw(x,y,ac){
  const hexToRgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`;};
  const rgb=hexToRgb(ac);
  const cols=[`rgba(${rgb},1)`,'rgba(255,255,255,1)','rgba(255,220,180,1)','rgba(200,220,255,1)'];
  for(let i=0;i<90;i++){
    const a=(Math.PI*2*i)/90+(Math.random()-.5)*.2;
    const s=1.5+Math.random()*4.5;
    animPs.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      size:1.2+Math.random()*2,alpha:1,decay:.013+Math.random()*.01,
      gravity:.055,color:cols[Math.floor(Math.random()*cols.length)],type:'spark'});
  }
  for(let i=0;i<14;i++){
    animPs.push({x,y,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,
      size:2.5+Math.random()*1.5,alpha:1,decay:.018,gravity:.02,
      color:'rgba(255,255,255,1)',type:'spark'});
  }
}

function drawAnim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const W=canvas.width,H=canvas.height;

  if(animPs[0]&&animPs[0].type==='dot'){
    // particle network
    animPs.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.alpha+=p.aV;
      if(p.alpha>0.8||p.alpha<0){p.aV*=-1;}
      if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
      ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();ctx.restore();
    });
    // lines between close dots
    for(let i=0;i<animPs.length;i++){
      for(let j=i+1;j<animPs.length;j++){
        const dx=animPs[i].x-animPs[j].x,dy=animPs[i].y-animPs[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){
          ctx.save();ctx.globalAlpha=(1-d/90)*0.12;
          ctx.beginPath();ctx.moveTo(animPs[i].x,animPs[i].y);ctx.lineTo(animPs[j].x,animPs[j].y);
          ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=0.5;ctx.stroke();ctx.restore();
        }
      }
    }
  } else {
    animPs=animPs.filter(p=>p.alpha>0.008);
    animPs.forEach(p=>{
      ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);
      if(p.type==='petal'){
        p.sway+=p.swayS;p.x+=p.vx+Math.sin(p.sway)*.6;p.y+=p.vy;p.rot+=p.rotV;
        ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.beginPath();ctx.ellipse(0,0,p.size/2,p.size/3.2,0,0,Math.PI*2);
        ctx.fillStyle=p.color;ctx.fill();
        if(p.y>H+20)p.y=-20;
      } else if(p.type==='snow'){
        p.x+=p.vx;p.y+=p.vy;
        if(p.y>H+5)p.y=-5;if(p.x<0)p.x=W;if(p.x>W)p.x=0;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;ctx.shadowBlur=4;ctx.shadowColor='rgba(255,255,255,0.6)';ctx.fill();
      } else if(p.type==='bokeh'){
        p.x+=p.vx;p.y+=p.vy;p.alpha+=p.aV;
        if(p.alpha>0.35||p.alpha<0){p.aV*=-1;}
        if(p.x<-p.size)p.x=W+p.size;if(p.x>W+p.size)p.x=-p.size;
        if(p.y<-p.size)p.y=H+p.size;if(p.y>H+p.size)p.y=-p.size;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;ctx.fill();
        ctx.beginPath();ctx.arc(p.x-p.size*.25,p.y-p.size*.25,p.size*.15,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();
      } else if(p.type==='spark'){
        p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.985;p.alpha-=p.decay;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;ctx.shadowBlur=10;ctx.shadowColor=p.color;ctx.fill();
      }
      ctx.restore();
    });
    // Refill petals/snow
    if(animPs.length<30&&(animPs[0]?.type==='petal'||animPs[0]?.type==='snow')){
      initAnim(ev?.animation);return;
    }
  }

  if(animRun) animFr=requestAnimationFrame(drawAnim);
}

load();
  </script>
</body>

</html>
